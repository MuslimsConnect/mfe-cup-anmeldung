<!doctype html>
<html lang="de">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="MFE Cup 2026 — Anmeldung zum 4v4 Fußballturnier bei München feiert Eid, 30. & 31. Mai 2026 im Riemer Park." />
    <meta name="theme-color" content="#352A62" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
    <title>MFE Cup 2026 — Anmeldung</title>
  </head>
  <body>
    <div id="root"></div>
    <!-- Hidden form for Netlify Forms detection -->
    <form name="cup-anmeldung" netlify netlify-honeypot="bot-field" hidden>
      <input name="bot-field" />
      <input name="teamname" />
      <input name="kapitaen_name" />
      <input name="kapitaen_telefon" />
      <input name="kapitaen_email" />
      <input name="spieler1_name" />
      <input name="spieler1_geburtsdatum" />
      <input name="spieler2_name" />
      <input name="spieler2_geburtsdatum" />
      <input name="spieler3_name" />
      <input name="spieler3_geburtsdatum" />
      <input name="spieler4_name" />
      <input name="spieler4_geburtsdatum" />
      <input name="spieler5_name" />
      <input name="spieler5_geburtsdatum" />
      <input name="spieler6_name" />
      <input name="spieler6_geburtsdatum" />
      <input name="spieler7_name" />
      <input name="spieler7_geburtsdatum" />
      <input name="spieler8_name" />
      <input name="spieler8_geburtsdatum" />
      <input name="regelwerk_bestaetigt" type="checkbox" />
      <input name="ueberweisung_bestaetigt" type="checkbox" />
      <input name="unterschrift_name" />
      <input name="digitale_bestaetigung" type="checkbox" />
    </form>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
